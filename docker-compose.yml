services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gynorg_backend
    restart: always
    ports:
      - "6174:8000"
    env_file:
      - .env

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: gynorg_frontend
    restart: always
    ports:
      - "7392:80"
    labels:
      - "net.unraid.docker.webui=http://[IP]:[PORT:7392]/"
    depends_on:
      - backend
